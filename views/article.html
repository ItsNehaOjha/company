<!DOCTYPE html>
<html lang="en">

<head>
  <!-- INCLUDE HEAD -->
</head>

<body>

  <!-- INCLUDE HEADER -->
  <!-- INCLUDE NAVBAR -->

  <!-- Article Container -->
  <main class="container article-container">

    <!-- Main Content (Left Column) -->
    <section class="article-main">
      <div id="articleMainWrapper">
        <div style="text-align: center; padding: 40px 0;">
          <h3>Loading Article Details...</h3>
        </div>
      </div>

      <!-- Comments Section -->
      <div class="comments-container"
        style="margin-top: 50px; border-top: 1px solid var(--color-border); padding-top: 30px;">
        <h3 class="section-title" style="font-size: 1.4rem; margin-bottom: 25px;"><span
            data-i18n="comments_section">Reader Comments</span></h3>

        <!-- List Comments -->
        <div id="commentsList" style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px;">
          <!-- Dynamically populated comments -->
        </div>

        <!-- Post Comment Form -->
        <div class="comment-form-box"
          style="background: var(--color-bg-card); padding: 25px; border-radius: var(--border-radius-md); box-shadow: var(--shadow-sm); border: 1px solid var(--color-border);">
          <h4 style="margin-top: 0; margin-bottom: 15px;">Leave a Comment</h4>
          <form id="articleCommentForm">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
              <div>
                <label for="commentName"
                  style="font-size: 0.8rem; font-weight: 600; display: block; margin-bottom: 5px;">NAME</label>
                <input type="text" id="commentName" class="form-control"
                  style="width: 100%; padding: 10px; border: 1px solid var(--color-border); border-radius: 4px;"
                  required>
              </div>
              <div>
                <label for="commentEmail"
                  style="font-size: 0.8rem; font-weight: 600; display: block; margin-bottom: 5px;">EMAIL (Will not be
                  published)</label>
                <input type="email" id="commentEmail" class="form-control"
                  style="width: 100%; padding: 10px; border: 1px solid var(--color-border); border-radius: 4px;"
                  required>
              </div>
            </div>
            <div style="margin-bottom: 15px;">
              <label for="commentContent"
                style="font-size: 0.8rem; font-weight: 600; display: block; margin-bottom: 5px;">COMMENT</label>
              <textarea id="commentContent" class="form-control"
                style="width: 100%; height: 120px; padding: 10px; border: 1px solid var(--color-border); border-radius: 4px; resize: vertical;"
                data-i18n="comment_placeholder" placeholder="Share your thoughts on this article..."
                required></textarea>
            </div>
            <button type="submit" class="btn-primary" style="padding: 10px 20px;" data-i18n="comment_submit">Post
              Comment</button>
          </form>
          <div id="commentAlertMsg" style="margin-top: 15px; font-weight: 600; display: none;"></div>
        </div>
      </div>
    </section>

    <!-- Sidebar (Right Column) -->
    <aside style="display: flex; flex-direction: column; gap: 40px;">

      <!-- Trending Widget -->
      <div class="trending-widget">
        <h3 data-i18n="trending_articles">Trending Now</h3>
        <div class="opinion-list" id="articleTrendingWrapper">
          <!-- Hydrated by JS -->
        </div>
      </div>

      <!-- Newsletter subscription -->
      <div class="trending-widget" style="background: var(--color-primary); color: #ffffff;">
        <h3 style="border-bottom-color: rgba(255,255,255,0.2); color: #ffffff;" data-i18n="newsletter_title">Subscribe
        </h3>
        <p style="font-size: 0.85rem; margin-bottom: 15px; opacity: 0.85;" data-i18n="newsletter_desc">Get news updates
          in your inbox daily.</p>
        <form id="newsletterForm" style="display: flex; flex-direction: column; gap: 10px;">
          <input type="email" class="newsletter-input" style="padding: 10px;" placeholder="Email address" required>
          <button type="submit" class="newsletter-btn" style="padding: 10px;">Subscribe</button>
        </form>
        <div id="newsletterMsg" class="newsletter-message"></div>
      </div>

    </aside>
  </main>

  <!-- Related Stories -->
  <section class="container" style="margin-bottom: 60px;">
    <h2 class="section-title">
      <span data-i18n="related_articles">Related Stories</span>
    </h2>
    <div class="grid-3" id="relatedStoriesGrid">
      <!-- Rendered by JS -->
    </div>
  </section>

  <!-- INCLUDE FOOTER -->

  <!-- INCLUDE MOBILE_NAV -->

  <!-- INCLUDE SCRIPTS -->
</body>

</html>
