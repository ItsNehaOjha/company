<!DOCTYPE html>
<html lang="en">

<head>
  <!-- INCLUDE HEAD -->
</head>

<body>

  <!-- INCLUDE HEADER -->
  <!-- INCLUDE NAVBAR -->

  <!-- Breaking News Ticker -->
  <div class="breaking-ticker">
    <div class="ticker-label">
      <span data-i18n="breaking_label">🔴 BREAKING</span>
    </div>
    <div class="ticker-content">
      <div class="ticker-text-wrapper" id="tickerWrapper">
        <span class="ticker-item">Loading live news feeds...</span>
      </div>
    </div>
  </div>

  <!-- Hero Headline Section -->
  <section class="hero-section" id="heroContainer">
    <!-- Hydrated dynamically by JavaScript -->
    <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #fff;">
      <h3>Loading Editorial Hero Story...</h3>
    </div>
  </section>

  <!-- Main Body Content -->
  <main class="container">

    <!-- Top Stories Grid -->
    <section style="margin-top: 40px; margin-bottom: 50px;">
      <h2 class="section-title">
        <span data-i18n="top_stories">Top Stories</span>
      </h2>
      <div class="grid-3" id="topStoriesGrid">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- National News Section -->
    <section class="category-section">
      <h2 class="section-title"><span data-i18n="nav_politics">National News</span></h2>
      <div class="grid-3" id="nationalGrid"></div>
    </section>

    <!-- Business Section -->
    <section class="category-section">
      <h2 class="section-title"><span data-i18n="nav_business">Business</span></h2>
      <div class="grid-3" id="businessGrid"></div>
    </section>

    <!-- Technology Section -->
    <section class="category-section">
      <h2 class="section-title"><span data-i18n="nav_technology">Technology</span></h2>
      <div class="grid-3" id="technologyGrid"></div>
    </section>

    <!-- Sports Section -->
    <section class="category-section">
      <h2 class="section-title"><span data-i18n="nav_sports">Sports</span></h2>
      <div class="grid-3" id="sportsGrid"></div>
    </section>

    <!-- Trending Topics -->
    <section class="trending-topics-section">
      <h2 class="section-title"><span>Trending Topics</span></h2>
      <div class="trending-topics" id="trendingTopics"></div>
    </section>

    <!-- Two Column Area: States Focus (Left) and Opinion (Right) -->
    <div class="grid-2-1">

      <!-- States Column Grid -->
      <section>
        <h2 class="section-title">
          <span data-i18n="focus_states">States Focus</span>
        </h2>
        <div class="state-columns-container">
          <div class="state-col" id="state-col-delhi-ncr"></div>
          <div class="state-col" id="state-col-uttar-pradesh"></div>
          <div class="state-col" id="state-col-punjab"></div>

        </div>
      </section>

      <!-- Sidebar: Opinion & Trending -->
      <aside style="display: flex; flex-direction: column; gap: 40px;">

        <!-- Opinion List -->
        <div>
          <h2 class="section-title">
            <span data-i18n="opinion_editorial">Opinion</span>
          </h2>
          <div class="opinion-list" id="opinionList">
            <!-- Hydrated by JS -->
          </div>
        </div>

        <!-- Trending Headlines -->
        <div class="trending-widget">
          <h3 data-i18n="trending_headlines">Trending</h3>
          <ol class="trending-list" id="trendingList">
            <!-- Hydrated by JS -->
          </ol>
        </div>

      </aside>
    </div>
  </main>



  <!-- Newsletter Subscription -->
  <section class="container">
    <div class="newsletter-section">
      <div class="newsletter-content">
        <h2 class="newsletter-title" data-i18n="newsletter_title">Subscribe to our newsletter</h2>
        <p class="newsletter-desc" data-i18n="newsletter_desc">Get the latest regional and national stories straight to
          your inbox.</p>
        <form class="newsletter-form" id="newsletterForm">
          <input type="email" class="newsletter-input" data-i18n="newsletter_placeholder" placeholder="Enter your email"
            required>
          <button type="submit" class="newsletter-btn" data-i18n="subscribe_btn">Subscribe</button>
        </form>
        <div class="newsletter-message" id="newsletterMsg"></div>
      </div>
    </div>
  </section>

  <!-- INCLUDE FOOTER -->

  <!-- INCLUDE MOBILE_NAV -->

  <!-- INCLUDE SCRIPTS -->
</body>

</html>
