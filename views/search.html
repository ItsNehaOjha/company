<!DOCTYPE html>
<html lang="en">

<head>
  <!-- INCLUDE HEAD -->
</head>

<body>

  <!-- INCLUDE HEADER -->
  <!-- INCLUDE NAVBAR -->

  <!-- Search Panel Main -->
  <main class="container" style="margin-top: 40px; margin-bottom: 60px;">

    <div style="margin-bottom: 30px;">
      <h1 class="section-title">
        <span data-i18n="search_title">Search News Archive</span>
      </h1>
    </div>

    <!-- Filters Section -->
    <section class="search-filter-wrapper">
      <div class="search-input-group">
        <input type="text" id="searchInput" class="search-textbox" data-i18n="search_placeholder"
          placeholder="Type search keywords...">
        <button class="btn-primary" id="searchTriggerBtn">
          <span data-i18n="search_btn">Search</span>
          <i class="fa-solid fa-magnifying-glass" style="margin-left: 5px; font-size: 14px;"></i>
        </button>
      </div>

      <div class="filters-grid">
        <!-- State Filter -->
        <div>
          <select id="stateFilter" class="filter-select">
            <option value="" data-i18n="filter_state">All States / Regions</option>
            <option value="National">National Coverage</option>
            <option value="Delhi NCR">Delhi NCR</option>
            <option value="Uttar Pradesh">Uttar Pradesh</option>
            <option value="Punjab">Punjab</option>
            <option value="Haryana">Haryana</option>
            <option value="Uttarakhand">Uttarakhand</option>
            <option value="Himachal Pradesh">Himachal Pradesh</option>
            <option value="Jammu & Kashmir">Jammu & Kashmir</option>
          </select>
        </div>

        <!-- Date Filter -->
        <div>
          <select id="dateFilter" class="filter-select">
            <option value="" data-i18n="filter_date">Any Time</option>
            <option value="today" data-i18n="filter_date_today">Past 24 Hours</option>
            <option value="week" data-i18n="filter_date_week">Past Week</option>
            <option value="month" data-i18n="filter_date_month">Past Month</option>
          </select>
        </div>


      </div>
    </section>

    <!-- Search Count Label -->
    <div style="margin-bottom: 25px; font-size: 0.9rem; color: var(--color-text-muted);">
      Found <strong id="searchCountLabel">0</strong> matching articles.
    </div>

    <!-- Results Grid -->
    <div class="grid-3" id="searchResultsGrid">
      <!-- Ingested dynamically by JS -->
    </div>

  </main>

  <!-- INCLUDE FOOTER -->

  <!-- INCLUDE MOBILE_NAV -->

  <!-- INCLUDE SCRIPTS -->
  <script>
    // Extract query parameters on load to trigger pre-filled filter values
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const state = params.get('state');

      if (state) {
        document.getElementById('stateFilter').value = state;
      }
    });
  </script>
</body>

</html>
